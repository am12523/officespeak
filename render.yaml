# Render Blueprint — deploy with one click from a connected GitHub repo:
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: officespeak
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false          # you paste this in the Render dashboard
      - key: DATABASE_URL
        sync: false          # paste a free Neon/Supabase Postgres URL; leave unset to use ephemeral SQLite
      - key: CORS_ORIGINS
        value: "*"
